  <text x="218" y="284" font-family="sans-serif" font-size="11" fill="#0F6E56">Organise open apps</text>
  <text x="218" y="300" font-family="sans-serif" font-size="11" fill="#0F6E56">across multiple desktops.</text>
  <rect x="348" y="242" width="136" height="76" rx="8" fill="#E1F5EE" stroke="#9FE1CB" stroke-width="0.75"/>
