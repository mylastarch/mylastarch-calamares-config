  <text x="514" y="200" font-family="sans-serif" font-size="11" fill="#0F6E56">for work, home,</text>
  <text x="514" y="216" font-family="sans-serif" font-size="11" fill="#0F6E56">and projects.</text>
  <rect x="52" y="242" width="136" height="76" rx="8" fill="#E1F5EE" stroke="#9FE1CB" stroke-width="0.75"/>
