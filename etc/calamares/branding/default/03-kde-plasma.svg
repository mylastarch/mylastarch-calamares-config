  <text x="218" y="184" font-family="sans-serif" font-size="11" fill="#0F6E56">Themes, widgets,</text>
  <text x="218" y="200" font-family="sans-serif" font-size="11" fill="#0F6E56">panels and layouts</text>
  <text x="218" y="216" font-family="sans-serif" font-size="11" fill="#0F6E56">fully adjustable.</text>
  <rect x="348" y="142" width="136" height="88" rx="8" fill="#E1F5EE" stroke="#9FE1CB" stroke-width="0.75"/>
  <text x="366" y="166" font-family="sans-serif" font-size="13" font-weight="500" fill="#085041">KDE Connect</text>
  <text x="366" y="184" font-family="sans-serif" font-size="11" fill="#0F6E56">Link your phone to</text>
  <text x="366" y="200" font-family="sans-serif" font-size="11" fill="#0F6E56">your desktop. Share</text>
  <text x="366" y="216" font-family="sans-serif" font-size="11" fill="#0F6E56">files and clipboard.</text>
  <rect x="496" y="142" width="132" height="88" rx="8" fill="#E1F5EE" stroke="#9FE1CB" stroke-width="0.75"/>
