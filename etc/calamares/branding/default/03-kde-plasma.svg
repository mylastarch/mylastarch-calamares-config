  <rect x="104" y="28" width="200" height="24" rx="12" fill="#E1F5EE" stroke="#5DCAA5" stroke-width="0.75"/>
  <text x="204" y="45" font-family="sans-serif" font-size="12" fill="#0F6E56" text-anchor="middle">Desktop Environment</text>
  <text x="104" y="82" font-family="sans-serif" font-size="36" font-weight="700" fill="#0F6E56" letter-spacing="-1">KDE Plasma 6</text>
  <text x="52" y="110" font-family="sans-serif" font-size="14" fill="#888780">A modern, beautiful, and fully customisable desktop for everyone.</text>
  <line x1="52" y1="126" x2="628" y2="126" stroke="#D3D1C7" stroke-width="0.75"/>
  <rect x="52" y="142" width="136" height="88" rx="8" fill="#E1F5EE" stroke="#9FE1CB" stroke-width="0.75"/>
  <text x="70" y="166" font-family="sans-serif" font-size="13" font-weight="500" fill="#085041">Wayland Native</text>
  <text x="70" y="184" font-family="sans-serif" font-size="11" fill="#0F6E56">Modern display server.</text>
  <text x="70" y="200" font-family="sans-serif" font-size="11" fill="#0F6E56">Better performance</text>
  <text x="70" y="216" font-family="sans-serif" font-size="11" fill="#0F6E56">and security.</text>
