  <circle cx="82" cy="60" r="30" fill="#E24B4A"/>
  <text x="82" y="70" font-family="sans-serif" font-size="30" font-weight="700" fill="white" text-anchor="middle">V</text>
  <rect x="126" y="28" width="120" height="24" rx="12" fill="#FCEBEB" stroke="#F09595" stroke-width="0.75"/>
  <text x="186" y="45" font-family="sans-serif" font-size="12" fill="#A32D2D" text-anchor="middle">Web Browser</text>
  <text x="126" y="82" font-family="sans-serif" font-size="36" font-weight="700" fill="#A32D2D" letter-spacing="-1">Vivaldi</text>
  <text x="52" y="110" font-family="sans-serif" font-size="14" fill="#888780">The browser that adapts to you — not the other way around.</text>
  <line x1="52" y1="126" x2="628" y2="126" stroke="#D3D1C7" stroke-width="0.75"/>
  <rect x="52" y="142" width="136" height="88" rx="8" fill="#FCEBEB" stroke="#F7C1C1" stroke-width="0.75"/>
  <text x="70" y="166" font-family="sans-serif" font-size="13" font-weight="500" fill="#791F1F">Tab Management</text>
  <text x="70" y="184" font-family="sans-serif" font-size="11" fill="#A32D2D">Stack and tile tabs.</text>
  <text x="70" y="200" font-family="sans-serif" font-size="11" fill="#A32D2D">Two-level tab bar.</text>
  <text x="70" y="216" font-family="sans-serif" font-size="11" fill="#A32D2D">Hibernate unused tabs.</text>
  <rect x="200" y="142" width="136" height="88" rx="8" fill="#FCEBEB" stroke="#F7C1C1" stroke-width="0.75"/>
  <text x="218" y="166" font-family="sans-serif" font-size="13" font-weight="500" fill="#791F1F">Built-in Tools</text>
  <text x="218" y="184" font-family="sans-serif" font-size="11" fill="#A32D2D">Mail, calendar, feed</text>
  <text x="218" y="200" font-family="sans-serif" font-size="11" fill="#A32D2D">reader all built in.</text>
  <text x="218" y="216" font-family="sans-serif" font-size="11" fill="#A32D2D">No extensions needed.</text>
  <rect x="348" y="142" width="136" height="88" rx="8" fill="#FCEBEB" stroke="#F7C1C1" stroke-width="0.75"/>
  <text x="366" y="166" font-family="sans-serif" font-size="13" font-weight="500" fill="#791F1F">Privacy First</text>
  <text x="366" y="184" font-family="sans-serif" font-size="11" fill="#A32D2D">Built-in ad and</text>
  <text x="366" y="200" font-family="sans-serif" font-size="11" fill="#A32D2D">tracker blocking.</text>
  <text x="366" y="216" font-family="sans-serif" font-size="11" fill="#A32D2D">No Google tracking.</text>
  <rect x="496" y="142" width="132" height="88" rx="8" fill="#FCEBEB" stroke="#F7C1C1" stroke-width="0.75"/>
  <text x="514" y="166" font-family="sans-serif" font-size="13" font-weight="500" fill="#791F1F">Customisation</text>
  <text x="514" y="184" font-family="sans-serif" font-size="11" fill="#A32D2D">Themes, accent</text>
  <text x="514" y="200" font-family="sans-serif" font-size="11" fill="#A32D2D">colors, layout and</text>
  <text x="514" y="216" font-family="sans-serif" font-size="11" fill="#A32D2D">UI fully adjustable.</text>
  <rect x="52" y="242" width="136" height="76" rx="8" fill="#FCEBEB" stroke="#F7C1C1" stroke-width="0.75"/>
  <text x="70" y="266" font-family="sans-serif" font-size="13" font-weight="500" fill="#791F1F">Command Palette</text>
  <text x="70" y="284" font-family="sans-serif" font-size="11" fill="#A32D2D">Quick access to any</text>
  <text x="70" y="300" font-family="sans-serif" font-size="11" fill="#A32D2D">browser function.</text>
  <rect x="200" y="242" width="136" height="76" rx="8" fill="#FCEBEB" stroke="#F7C1C1" stroke-width="0.75"/>
  <text x="218" y="266" font-family="sans-serif" font-size="13" font-weight="500" fill="#791F1F">Web Panels</text>
  <text x="218" y="284" font-family="sans-serif" font-size="11" fill="#A32D2D">Pin any website as</text>
  <text x="218" y="300" font-family="sans-serif" font-size="11" fill="#A32D2D">a side panel.</text>
  <rect x="348" y="242" width="136" height="76" rx="8" fill="#FCEBEB" stroke="#F7C1C1" stroke-width="0.75"/>
  <text x="366" y="266" font-family="sans-serif" font-size="13" font-weight="500" fill="#791F1F">Notes Manager</text>
  <text x="366" y="284" font-family="sans-serif" font-size="11" fill="#A32D2D">Take notes while</text>
  <text x="366" y="300" font-family="sans-serif" font-size="11" fill="#A32D2D">you browse.</text>
  <rect x="496" y="242" width="132" height="76" rx="8" fill="#FCEBEB" stroke="#F7C1C1" stroke-width="0.75"/>
  <text x="514" y="266" font-family="sans-serif" font-size="13" font-weight="500" fill="#791F1F">Chromium Core</text>
  <text x="514" y="284" font-family="sans-serif" font-size="11" fill="#A32D2D">Full Chrome extension</text>
  <text x="514" y="300" font-family="sans-serif" font-size="11" fill="#A32D2D">compatibility.</text>
  <rect x="0" y="366" width="680" height="16" fill="#E24B4A" opacity="0.12"/>
  <text x="340" y="378" font-family="sans-serif" font-size="10" fill="#A32D2D" text-anchor="middle" letter-spacing="1">MYLASTARCH RC1  ·  INCLUDED SOFTWARE</text>
