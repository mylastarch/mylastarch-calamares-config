<svg width="1920" height="1080" viewBox="0 0 680 382" xmlns="http://www.w3.org/2000/svg">
  <rect width="680" height="382" fill="#F8F9FC"/>
  <rect x="0" y="0" width="680" height="4" fill="#5C6BC0"/>
  <rect x="0" y="0" width="6" height="382" fill="#5C6BC0"/>

  <!-- ATT logo: wrench/spanner overlaid on Arch chevron -->
  <g transform="translate(52,28)">
    <circle cx="33" cy="33" r="33" fill="#5C6BC0"/>
    <!-- Arch chevron in white -->
    <path d="M33 8 L16 40 L20 40 L33 18 L46 40 L50 40 Z" fill="white"/>
    <path d="M33 22 L24 40 L33 36 L42 40 Z" fill="#5C6BC0"/>
    <!-- Wrench shape -->
    <circle cx="46" cy="20" r="6" fill="none" stroke="#E8EAFF" stroke-width="2.5"/>
    <line x1="42" y1="24" x2="28" y2="44" stroke="#E8EAFF" stroke-width="2.5" stroke-linecap="round"/>
  </g>

  <rect x="134" y="28" width="158" height="24" rx="12" fill="#ECEEF9" stroke="#ABAEE8" stroke-width="0.75"/>
  <text x="213" y="45" font-family="sans-serif" font-size="12" fill="#3949AB" text-anchor="middle">System Tweak Tool</text>

  <text x="134" y="82" font-family="sans-serif" font-size="28" font-weight="700" fill="#3949AB" letter-spacing="-1">ArchLinux Tweak Tool</text>
  <text x="52" y="110" font-family="sans-serif" font-size="14" fill="#888780">A powerful GUI tool to configure and fine-tune your Arch-based system.</text>

  <line x1="52" y1="126" x2="628" y2="126" stroke="#D3D1C7" stroke-width="0.75"/>

  <!-- Row 1 -->
  <rect x="52" y="142" width="136" height="88" rx="8" fill="#ECEEF9" stroke="#ABAEE8" stroke-width="0.75"/>
  <text x="70" y="166" font-family="sans-serif" font-size="13" font-weight="500" fill="#283593">Pacman Repos</text>
  <text x="70" y="184" font-family="sans-serif" font-size="11" fill="#3949AB">Add, remove, and</text>
  <text x="70" y="200" font-family="sans-serif" font-size="11" fill="#3949AB">order repositories</text>
  <text x="70" y="216" font-family="sans-serif" font-size="11" fill="#3949AB">in pacman.conf.</text>

  <rect x="200" y="142" width="136" height="88" rx="8" fill="#ECEEF9" stroke="#ABAEE8" stroke-width="0.75"/>
  <text x="218" y="166" font-family="sans-serif" font-size="13" font-weight="500" fill="#283593">Mirror Manager</text>
  <text x="218" y="184" font-family="sans-serif" font-size="11" fill="#3949AB">Set fastest mirrors</text>
  <text x="218" y="200" font-family="sans-serif" font-size="11" fill="#3949AB">via reflector or</text>
  <text x="218" y="216" font-family="sans-serif" font-size="11" fill="#3949AB">rate-mirrors.</text>

  <rect x="348" y="142" width="136" height="88" rx="8" fill="#ECEEF9" stroke="#ABAEE8" stroke-width="0.75"/>
  <text x="366" y="166" font-family="sans-serif" font-size="13" font-weight="500" fill="#283593">Kernel Manager</text>
  <text x="366" y="184" font-family="sans-serif" font-size="11" fill="#3949AB">Switch between LTS,</text>
  <text x="366" y="200" font-family="sans-serif" font-size="11" fill="#3949AB">Zen, CachyOS and</text>
  <text x="366" y="216" font-family="sans-serif" font-size="11" fill="#3949AB">other kernels.</text>

  <rect x="496" y="142" width="132" height="88" rx="8" fill="#ECEEF9" stroke="#ABAEE8" stroke-width="0.75"/>
  <text x="514" y="166" font-family="sans-serif" font-size="13" font-weight="500" fill="#283593">Wayland &amp; X11</text>
  <text x="514" y="184" font-family="sans-serif" font-size="11" fill="#3949AB">Works on both</text>
  <text x="514" y="200" font-family="sans-serif" font-size="11" fill="#3949AB">Wayland and X11</text>
  <text x="514" y="216" font-family="sans-serif" font-size="11" fill="#3949AB">display sessions.</text>

  <!-- Row 2 -->
  <rect x="52" y="242" width="136" height="76" rx="8" fill="#ECEEF9" stroke="#ABAEE8" stroke-width="0.75"/>
  <text x="70" y="266" font-family="sans-serif" font-size="13" font-weight="500" fill="#283593">SDDM Config</text>
  <text x="70" y="284" font-family="sans-serif" font-size="11" fill="#3949AB">Fix and configure</text>
  <text x="70" y="300" font-family="sans-serif" font-size="11" fill="#3949AB">your login manager.</text>

  <rect x="200" y="242" width="136" height="76" rx="8" fill="#ECEEF9" stroke="#ABAEE8" stroke-width="0.75"/>
  <text x="218" y="266" font-family="sans-serif" font-size="13" font-weight="500" fill="#283593">Package Cleanup</text>
  <text x="218" y="284" font-family="sans-serif" font-size="11" fill="#3949AB">Remove unwanted</text>
  <text x="218" y="300" font-family="sans-serif" font-size="11" fill="#3949AB">apps with one click.</text>

  <rect x="348" y="242" width="136" height="76" rx="8" fill="#ECEEF9" stroke="#ABAEE8" stroke-width="0.75"/>
  <text x="366" y="266" font-family="sans-serif" font-size="13" font-weight="500" fill="#283593">Multi-Distro</text>
  <text x="366" y="284" font-family="sans-serif" font-size="11" fill="#3949AB">Supports all major</text>
  <text x="366" y="300" font-family="sans-serif" font-size="11" fill="#3949AB">Arch-based distros.</text>

  <rect x="496" y="242" width="132" height="76" rx="8" fill="#ECEEF9" stroke="#ABAEE8" stroke-width="0.75"/>
  <text x="514" y="266" font-family="sans-serif" font-size="13" font-weight="500" fill="#283593">System Probe</text>
  <text x="514" y="284" font-family="sans-serif" font-size="11" fill="#3949AB">View detailed system</text>
  <text x="514" y="300" font-family="sans-serif" font-size="11" fill="#3949AB">hardware info.</text>

  <rect x="0" y="366" width="680" height="16" fill="#5C6BC0" opacity="0.12"/>
  <text x="340" y="378" font-family="sans-serif" font-size="10" fill="#3949AB" text-anchor="middle" letter-spacing="1">MYLASTARCH RC2  ·  INCLUDED SOFTWARE</text>
</svg>
