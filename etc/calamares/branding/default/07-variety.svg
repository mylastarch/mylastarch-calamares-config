<svg width="1920" height="1080" viewBox="0 0 680 382" xmlns="http://www.w3.org/2000/svg">
  <rect width="680" height="382" fill="#F8F9FC"/>
  <rect x="0" y="0" width="680" height="4" fill="#BA7517"/>
  <rect x="0" y="0" width="6" height="382" fill="#BA7517"/>
  <g transform="translate(52,30)">
    <path d="M4,32 Q36,2 68,32 Q36,62 4,32 Z" fill="#FAEEDA" stroke="#BA7517" stroke-width="2.5"/>
    <circle cx="36" cy="32" r="14" fill="#BA7517"/>
    <circle cx="36" cy="32" r="8" fill="#854F0B"/>
    <circle cx="40" cy="27" r="3" fill="#FAC775" opacity="0.7"/>
  </g>
  <rect x="130" y="28" width="158" height="24" rx="12" fill="#FAEEDA" stroke="#FAC775" stroke-width="0.75"/>
  <text x="209" y="45" font-family="sans-serif" font-size="12" fill="#854F0B" text-anchor="middle">Wallpaper Manager</text>
  <text x="130" y="82" font-family="sans-serif" font-size="36" font-weight="700" fill="#854F0B" letter-spacing="-1">Variety</text>
  <text x="52" y="110" font-family="sans-serif" font-size="14" fill="#888780">Keep your desktop fresh with automatically changing wallpapers.</text>
  <line x1="52" y1="126" x2="628" y2="126" stroke="#D3D1C7" stroke-width="0.75"/>
  <rect x="52" y="142" width="136" height="88" rx="8" fill="#FAEEDA" stroke="#FAC775" stroke-width="0.75"/>
  <text x="70" y="166" font-family="sans-serif" font-size="13" font-weight="500" fill="#633806">Auto Changer</text>
  <text x="70" y="184" font-family="sans-serif" font-size="11" fill="#854F0B">Change wallpaper on</text>
  <text x="70" y="200" font-family="sans-serif" font-size="11" fill="#854F0B">a set interval. Configured</text>
  <text x="70" y="216" font-family="sans-serif" font-size="11" fill="#854F0B">to 5 min on this ISO.</text>
  <rect x="200" y="142" width="136" height="88" rx="8" fill="#FAEEDA" stroke="#FAC775" stroke-width="0.75"/>
  <text x="218" y="166" font-family="sans-serif" font-size="13" font-weight="500" fill="#633806">Online Sources</text>
  <text x="218" y="184" font-family="sans-serif" font-size="11" fill="#854F0B">Fetches from Unsplash,</text>
  <text x="218" y="200" font-family="sans-serif" font-size="11" fill="#854F0B">Flickr, NASA and</text>
  <text x="218" y="216" font-family="sans-serif" font-size="11" fill="#854F0B">many more sources.</text>
  <rect x="348" y="142" width="136" height="88" rx="8" fill="#FAEEDA" stroke="#FAC775" stroke-width="0.75"/>
  <text x="366" y="166" font-family="sans-serif" font-size="13" font-weight="500" fill="#633806">Local Folders</text>
  <text x="366" y="184" font-family="sans-serif" font-size="11" fill="#854F0B">Use your own photos.</text>
  <text x="366" y="200" font-family="sans-serif" font-size="11" fill="#854F0B">Points to your personal</text>
  <text x="366" y="216" font-family="sans-serif" font-size="11" fill="#854F0B">Downloads folder.</text>
  <rect x="496" y="142" width="132" height="88" rx="8" fill="#FAEEDA" stroke="#FAC775" stroke-width="0.75"/>
  <text x="514" y="166" font-family="sans-serif" font-size="13" font-weight="500" fill="#633806">Filters</text>
  <text x="514" y="184" font-family="sans-serif" font-size="11" fill="#854F0B">Skip images that are</text>
  <text x="514" y="200" font-family="sans-serif" font-size="11" fill="#854F0B">too dark, too light,</text>
  <text x="514" y="216" font-family="sans-serif" font-size="11" fill="#854F0B">or portrait ratio.</text>
  <rect x="52" y="242" width="136" height="76" rx="8" fill="#FAEEDA" stroke="#FAC775" stroke-width="0.75"/>
  <text x="70" y="266" font-family="sans-serif" font-size="13" font-weight="500" fill="#633806">KDE Slideshow</text>
  <text x="70" y="284" font-family="sans-serif" font-size="11" fill="#854F0B">Synced with Plasma</text>
  <text x="70" y="300" font-family="sans-serif" font-size="11" fill="#854F0B">slideshow wallpaper.</text>
  <rect x="200" y="242" width="136" height="76" rx="8" fill="#FAEEDA" stroke="#FAC775" stroke-width="0.75"/>
  <text x="218" y="266" font-family="sans-serif" font-size="13" font-weight="500" fill="#633806">Image Preview</text>
  <text x="218" y="284" font-family="sans-serif" font-size="11" fill="#854F0B">Browse and favourite</text>
  <text x="218" y="300" font-family="sans-serif" font-size="11" fill="#854F0B">your collection.</text>
  <rect x="348" y="242" width="136" height="76" rx="8" fill="#FAEEDA" stroke="#FAC775" stroke-width="0.75"/>
  <text x="366" y="266" font-family="sans-serif" font-size="13" font-weight="500" fill="#633806">Smart Download</text>
  <text x="366" y="284" font-family="sans-serif" font-size="11" fill="#854F0B">Saves wallpapers to</text>
  <text x="366" y="300" font-family="sans-serif" font-size="11" fill="#854F0B">~/.config/variety/.</text>
  <rect x="496" y="242" width="132" height="76" rx="8" fill="#FAEEDA" stroke="#FAC775" stroke-width="0.75"/>
  <text x="514" y="266" font-family="sans-serif" font-size="13" font-weight="500" fill="#633806">Quotes Overlay</text>
  <text x="514" y="284" font-family="sans-serif" font-size="11" fill="#854F0B">Display inspirational</text>
  <text x="514" y="300" font-family="sans-serif" font-size="11" fill="#854F0B">quotes on wallpaper.</text>
  <rect x="0" y="366" width="680" height="16" fill="#BA7517" opacity="0.12"/>
  <text x="340" y="378" font-family="sans-serif" font-size="10" fill="#854F0B" text-anchor="middle" letter-spacing="1">MYLASTARCH RC1  ·  INCLUDED SOFTWARE</text>
</svg>
