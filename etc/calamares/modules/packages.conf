#This file is part of calamares installer for ALG

backend: pacman

skip_if_no_internet: false
update_db: true
update_system: false
#ignore_update_db_error: true

pacman:
    num_retries: 5
    disable_download_timeout: false
    needed_only: true


operations:
  - try_remove:
    - calamares
    - mylastarch-calamares-config
    - kconfig