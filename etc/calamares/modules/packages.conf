#This file is part of calamares installer for ALG

backend: pacman

skip_if_no_internet: false
update_db: false
update_system: false
ignore_update_db_error: true

pacman:
    num_retries: 5
    disable_download_timeout: false
    needed_only: true


operations:
   - try_remove:
    - calamares
    - boost
    - solid
    - yaml-cpp
    - kpmcore
    - hwinfo
    - qt5-svg
    - polkit-qt5
    - plasma-framework
    - qt5-xmlpatterns
    - squashfs-tools
    - linux-atm
    - livecd-sounds
    - mkinitcpio-archiso
    - arch-install-scripts
    - ckbcomp
    - mkinitcpio-openswap
    - pearos-livecd-desktop
    - gnome-software