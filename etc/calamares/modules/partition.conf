{
  "device": "/dev/sda",
  "operations": [
    {
      "type": "create",
      "partition": {
        "number": 1,
        "size": "512M",
        "filesystem": "vfat",
        "flags": ["esp","boot"]
      }
    },
    {
      "type": "create",
      "partition": {
        "number": 2,
        "size": "80%",
        "filesystem": "ext4"
      }
    },
    {
      "type": "create",
      "partition": {
        "number": 3,
        "size": "20%",
        "filesystem": "swap"
      }
    },
    {
      "type": "format",
      "partition": {"device": "/dev/sda1", "filesystem": "vfat"}
    },
    {
      "type": "format",
      "partition": {"device": "/dev/sda2", "filesystem": "ext4"}
    },
    {
      "type": "format",
      "partition": {"device": "/dev/sda3", "filesystem": "swap"}
    }
  ]
}