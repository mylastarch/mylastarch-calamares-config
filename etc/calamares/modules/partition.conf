{
  "module": "partition",
  "interactive": false,
  "bootLoaderInstallation": true,
  "installType": "custom",
  "deviceOperations": "all",
  "partitions": [
    {
      "mountPoint": "/boot/efi",
      "filesystem": "vfat",
      "size": 512,
      "flags": ["boot","esp"],
      "format": true
    },
    {
      "mountPoint": "/",
      "filesystem": "ext4",
      "size": 0,
      "format": true
    },
    {
      "mountPoint": "/home",
      "filesystem": "ext4",
      "size": 0,
      "format": true
    }
  ],
  "preserve": [],
  "wipe": true,
  "autoPartition": {
    "type": "gpt",
    "mode": "uefi",
    "createSwap": false
  }
}