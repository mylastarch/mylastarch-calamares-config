showSupportUrl:         true
showKnownIssuesUrl:     true
showReleaseNotesUrl:    true

requirements:
    requiredStorage:    7.9

    requiredRam:        1.0

    internetCheckUrl:   http://google.com

    check:
        - storage
        - ram
        - power
        - internet
        - root

    required:
        - storage
        - ram
        - root

geoip:
    style:    "json"
    url:      "https://ipapi.co/json"  # extended XML format
    selector: "Country"  # blank uses default, which is wrong
